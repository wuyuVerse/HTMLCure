# Minimal provider profile for OpenAI-compatible APIs.
# Copy to configs/models.yaml and export HTMLCURE_API_KEY before running.

models:
  provider_model:
    base_url: "https://YOUR_API_ENDPOINT/v1"
    api_key: "${HTMLCURE_API_KEY}"
    model: "your-model-name"
    concurrency: 2
    temperature: 0.7
    timeout: 180
