# HTMLRefine repair configuration.
# This is optional; HTMLCure benchmark evaluation only needs eval.example.yaml.

agent:
  base_url: "${HTMLEVAL_BASE_URL}"
  api_key: "${HTMLEVAL_API_KEY}"
  model: "${HTMLEVAL_MODEL}"
  max_steps: 30
  timeout: 600
  llm_timeout: 300

evaluator:
  base_url: "${HTMLEVAL_BASE_URL}"
  api_key: "${HTMLEVAL_API_KEY}"
  model: "${HTMLEVAL_MODEL}"
  max_screenshots: 14

repair:
  base_url: "${HTMLCURE_REPAIR_BASE_URL}"
  api_key: "${HTMLCURE_REPAIR_API_KEY}"
  model: "${HTMLCURE_REPAIR_MODEL}"
  max_iterations: 3
  improvement_threshold: 2.0
  strategies:
    - bug_fix
    - feature_complete
    - visual_enhance
    - holistic_rewrite

processing:
  concurrency: 2
  browser_pool_size: 2
  browser_launch_rate: 1.0
  port: 8890
  retry: 2
  save_interval: 10
  resume: true
  skip_agent_phase: true

filter:
  tier_a_threshold: 80
  tier_b_threshold: 40
  min_html_size: 200

workspace: "./outputs/refine_workspace"
