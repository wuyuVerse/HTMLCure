# Named OpenAI-compatible model profiles for benchmark generation.
# Copy this file to configs/models.yaml and set the environment variables.

models:
  example_api_model:
    base_url: "https://YOUR_API_ENDPOINT/v1"
    api_key: "${HTMLCURE_API_KEY}"
    model: "your-model-name"
    concurrency: 2
    temperature: 0.7
    timeout: 180

  local_vllm:
    base_url: "http://127.0.0.1:8000/v1"
    api_key: "EMPTY"
    model: "local-html-model"
    concurrency: 2
    temperature: 0.0
    timeout: 600
